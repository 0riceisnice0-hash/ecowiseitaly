name: Theme validation

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Check validation tools
        run: |
          node --check tools/build-fidelity-snapshots.mjs
          node --check tools/validate-theme.mjs

      - name: Validate fidelity contract
        env:
          PHP_BINARY: php
        run: node tools/validate-theme.mjs .

      - name: Lint all theme PHP
        run: find wp-content/themes/ecowise-custom -type f -name '*.php' -print0 | xargs -0 -n1 php -l
